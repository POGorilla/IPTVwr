<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Error')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container text-center" style="margin-top: 80px;">
    <h1 class="display-1 text-danger" th:text="${status} ?: '?'">?</h1>
    <h2 class="mb-4" th:text="${error} ?: 'Something went wrong'">Error</h2>
    <p class="text-muted" th:if="${message}" th:text="${message}"></p>
    <p class="text-muted" th:unless="${message}">An unexpected error occurred. Please try again.</p>
    <a th:href="@{/home}" class="btn btn-primary mt-3">Go home</a>
    <a th:href="@{/browse}" class="btn btn-outline-primary mt-3">Browse channels</a>
</div>
</body>
</html>
