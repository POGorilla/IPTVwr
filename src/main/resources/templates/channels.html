<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>My channels</title></head>
<body>
<h1>My channels</h1>

<div th:if="${message}" style="color: green;" th:text="${message}"></div>
<div th:if="${error}" style="color: red;" th:text="${error}"></div>

<div th:if="${channels.isEmpty()}">
    <p>No channels here yet! <a th:href="@{/upload}">Upload a playlist.</a></p>
</div>

<div th:each="channel : ${channels}" style="margin-bottom: 10px; padding: 5px; border: 1px solid #ccc;">
    <strong th:text="${channel.name}">Channel name</strong>
    <span th:text="'[' + ${channel.groupTitle} + ']'">[Grup]</span>
    <br/>
    <a th:href="@{/watch/{id}(id=${channel.id})}">Watch</a>
</div>

<br/>
<a th:href="@{/upload}">New upload</a> |
<a th:href="@{/home}">Back</a>
</body>
</html>
