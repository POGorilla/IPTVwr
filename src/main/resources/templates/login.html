<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Login')}"></head>
<body>
<div class="container" style="max-width: 400px; margin-top: 100px;">
    <h2 class="text-center mb-4">Login</h2>
    <div th:if="${param.error}" class="alert alert-danger">Invalid username or password.</div>
    <div th:if="${param.success}" class="alert alert-success">Registration successful! Please log in.</div>
    <div th:if="${param.logout}" class="alert alert-info">Logged out.</div>
    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required/>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    <p class="text-center mt-3">No account? <a th:href="@{/register}">Register</a></p>
</div>
</body>
</html>
