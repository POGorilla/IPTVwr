<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Watch')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container">
    <h1 th:text="${channel.name}">Channel</h1>
    <p class="text-muted" th:text="'Group: ' + ${channel.groupTitle}">Group</p>

    <video id="video" controls autoplay muted class="w-100 rounded" style="max-height: 500px; background: #000;"></video>

    <div class="mt-3">
        <a th:href="@{/channels}" class="btn btn-outline-secondary">My Channels</a>
        <a th:href="@{/browse}" class="btn btn-outline-secondary">Browse</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script th:inline="javascript">
    var streamUrl = [[${channel.streamUrl}]];
    var video = document.getElementById('video');
    if (Hls.isSupported()) {
        var hls = new Hls();
        hls.loadSource(streamUrl);
        hls.attachMedia(video);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = streamUrl;
    }
</script>
</body>
</html>
