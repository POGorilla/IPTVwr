<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${channel.name}">Channel</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
<h1 th:text="${channel.name}">Channel name</h1>
<p th:text="'Grup: ' + ${channel.groupTitle}">Group</p>

<video id="video" controls autoplay muted width="800" height="450"></video>

<br/><br/>
<a th:href="@{/channels}">Back to channels</a>

<script th:inline="javascript">
    var streamUrl = [[${channel.streamUrl}]];
    var video = document.getElementById('video');

    if (Hls.isSupported()) {
        var hls = new Hls();
        hls.loadSource(streamUrl);
        hls.attachMedia(video);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = streamUrl;
    } else {
        var msg = document.createElement('p');
        msg.style.color = 'red';
        msg.textContent = 'Your browser does not support HLS playback.';
        video.parentElement.appendChild(msg);
    }
</script>
</body>
</html>
