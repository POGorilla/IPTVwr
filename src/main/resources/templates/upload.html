<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Upload')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container" style="max-width: 500px;">
    <h1 class="mb-4">Upload .m3u Playlist</h1>
    <form th:action="@{/upload}" method="post" enctype="multipart/form-data">
        <div class="mb-3">
            <input type="file" name="file" accept=".m3u,.m3u8" class="form-control" required/>
        </div>
        <button type="submit" class="btn btn-primary">Upload</button>
    </form>
    <a th:href="@{/home}" class="btn btn-outline-secondary mt-3">Back</a>
</div>
</body>
</html>
